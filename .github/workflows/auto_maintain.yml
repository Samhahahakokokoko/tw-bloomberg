name: Auto Maintain

on:
  schedule:
    # 每天 03:00 台灣時間（UTC 19:00）
    - cron: '0 19 * * *'
    # 每週日 03:00 台灣時間（UTC 週六 19:00）額外執行週報
    - cron: '0 19 * * 6'
  workflow_dispatch:
    inputs:
      weekly:
        description: '強制執行週報測試'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv loguru aiosqlite asyncpg \
            line-bot-sdk fastapi 2>/dev/null || true
          # 安裝完整依賴（有 requirements.txt 則用完整版）
          [ -f requirements.txt ] && pip install -r requirements.txt --quiet || true

      # ── 3. Railway CLI（選填）─────────────────────────────────────
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh 2>/dev/null \
            || echo "Railway CLI 不可用，改用 GraphQL API"

      # ── 4. 規則引擎維護 + 健康測試 + LINE 推播 ────────────────────
      - name: Run auto_maintain
        id: maintain
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_LINE_UID:            ${{ secrets.ADMIN_LINE_UID }}
          RAILWAY_TOKEN:             ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID:        ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID:        ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_BACKEND_URL:       ${{ secrets.RAILWAY_BACKEND_URL }}
          DATABASE_URL:              ${{ secrets.DATABASE_URL }}
        run: |
          set +e

          # 週六 UTC（= 台灣週日）或手動指定 weekly=true → 加 --weekly
          DOW=$(date -u +%u)   # 1=Mon … 7=Sun；6=Sat UTC = 台灣週日
          WEEKLY_FLAG=""
          [ "$DOW" = "6" ] && WEEKLY_FLAG="--weekly"
          [ "${{ github.event.inputs.weekly }}" = "true" ] && WEEKLY_FLAG="--weekly"

          python auto_maintain.py $WEEKLY_FLAG
          RESULT=$?
          set -e

          echo "exit_code=${RESULT}" >> "$GITHUB_OUTPUT"
          echo "weekly=${WEEKLY_FLAG}" >> "$GITHUB_OUTPUT"

          # exit 1 = 腳本錯誤（罕見），直接 fail
          [ "$RESULT" -eq 1 ] && echo "::error::auto_maintain.py 執行失敗" && exit 1
          # exit 0 = 無修復；exit 2 = 已修復程式碼 — 兩者都正常繼續

      # ── 5. 偵測程式碼變更 ──────────────────────────────────────────
      - name: Check for code changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "無程式碼變更"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "=== 已變更檔案 ===" && git diff --stat
          fi

      # ── 6. 語法檢查（有修復時才跑）────────────────────────────────
      - name: Syntax check
        if: steps.diff.outputs.changed == 'true'
        id: tests
        run: |
          PASS=true
          find backend    -name "*.py" -exec python -m py_compile {} + || PASS=false
          find quant      -name "*.py" -exec python -m py_compile {} + || PASS=false
          find line_webhook -name "*.py" -exec python -m py_compile {} + || PASS=false
          echo "passed=${PASS}" >> "$GITHUB_OUTPUT"
          [ "$PASS" = "true" ] && echo "✅ 語法檢查通過" || echo "❌ 語法檢查失敗"

      # ── 7. Commit + push（語法通過才執行）─────────────────────────
      - name: Commit and push fixes
        if: >
          steps.diff.outputs.changed == 'true' &&
          steps.tests.outputs.passed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add -A
          git commit -m "fix: auto-maintain ${DATE} [rule-engine]"
          git push origin main
          echo "✅ 修復已 push 至 main"

      # ── 8. 語法失敗時建 PR 讓人工審查 ─────────────────────────────
      - name: Create PR for failed syntax
        if: >
          steps.diff.outputs.changed == 'true' &&
          steps.tests.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y%m%d-%H%M)
          BRANCH="auto-fix/${DATE}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "fix: auto-maintain $(date -u +%Y-%m-%d) [needs-review]"
          git push origin "${BRANCH}"
          gh pr create \
            --title "fix: auto-maintain $(date -u +%Y-%m-%d)" \
            --body "⚠️ 規則引擎套用了修復，但語法檢查失敗，請人工審查後 merge。" \
            --head "${BRANCH}" --base main \
            --label "needs-review" 2>/dev/null || true

      # ── 9. 摘要 ────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "==========================================="
          echo "Auto-Maintain 結果"
          echo "==========================================="
          echo "維護腳本 exit : ${{ steps.maintain.outputs.exit_code }}"
          echo "週報模式      : ${{ steps.maintain.outputs.weekly != '' && '是' || '否' }}"
          echo "程式碼有變更  : ${{ steps.diff.outputs.changed }}"
          echo "語法檢查      : ${{ steps.tests.outputs.passed }}"
          echo "==========================================="
