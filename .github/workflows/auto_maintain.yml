name: Auto Maintain

on:
  schedule:
    - cron: '0 19 * * *'   # 03:00 台灣時間（UTC+8 = UTC 19:00）
  workflow_dispatch:        # 允許從 Actions 頁面手動觸發

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Railway CLI（選填，失敗時降級為 GraphQL API）─────────────
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh 2>/dev/null \
            || npm install -g @railway/cli 2>/dev/null \
            || echo "Railway CLI 不可用，將使用 GraphQL API 備援"

      # ── 4. 執行自動維護：抓 logs → Claude 分析 → 套用修復 → 測試 → LINE ──
      - name: Analyse, patch & report
        id: maintain
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_LINE_UID:             ${{ secrets.ADMIN_LINE_UID }}
          RAILWAY_TOKEN:              ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID:         ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID:         ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_BACKEND_URL:        ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          set +e
          python auto_maintain.py
          RESULT=$?
          set -e
          echo "exit_code=${RESULT}" >> "$GITHUB_OUTPUT"
          # 0 = 無變更, 1 = 腳本錯誤, 2 = 已套用修復
          if [ "$RESULT" -eq 1 ]; then
            echo "::error::auto_maintain.py 執行失敗（API 憑證或其他錯誤）"
            exit 1
          fi

      # ── 5. 偵測程式碼變更 ──────────────────────────────────────────
      - name: Check for code changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "無程式碼變更，維護完成"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "=== 已變更檔案 ==="
            git diff --stat
          fi

      # ── 6. 語法測試（僅在有修復時執行）─────────────────────────────
      - name: Run syntax tests
        if: steps.diff.outputs.changed == 'true'
        id: tests
        run: |
          PASS=true
          if [ -d tests ]; then
            python -m pytest tests/ -x --tb=short -q || PASS=false
          else
            echo "無 tests/ 目錄 — 執行語法檢查"
            find backend -name "*.py" -exec python -m py_compile {} + || PASS=false
            find quant   -name "*.py" -exec python -m py_compile {} + || PASS=false
          fi
          echo "passed=${PASS}" >> "$GITHUB_OUTPUT"
          [ "$PASS" = "true" ] && echo "語法測試：通過" || echo "語法測試：失敗"

      # ── 7. 建立分支 + commit + push ───────────────────────────────
      - name: Create branch and commit
        if: steps.diff.outputs.changed == 'true'
        id: branch
        run: |
          DATE=$(date -u +%Y%m%d-%H%M)
          BRANCH="auto-fix/${DATE}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "fix: auto-maintain $(date -u +%Y-%m-%d)"
          git push origin "${BRANCH}"

      # ── 8. 建立 PR ────────────────────────────────────────────────
      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TESTS_OK="${{ steps.tests.outputs.passed }}"
          TODAY=$(date -u +%Y-%m-%d)
          TIME_UTC=$(date -u +"%Y-%m-%d %H:%M")
          SUMMARY=$(cat data/ci_fix_summary.txt 2>/dev/null || echo "詳見 diff")

          if [ "$TESTS_OK" = "true" ]; then
            STATUS="✅ 語法測試通過 — 將自動 merge"
          else
            STATUS="⚠️ 測試失敗 — 請人工審查後再 merge"
          fi

          printf '## 🤖 Auto-Maintain 報告\n\n%s\n\n### 修復 / 測試清單\n```\n%s\n```\n\n---\n由 `auto_maintain.yml` 自動生成 · %s UTC\n' \
            "$STATUS" "$SUMMARY" "$TIME_UTC" > /tmp/pr_body.md

          PR_URL=$(gh pr create \
            --title "fix: auto-maintain ${TODAY}" \
            --body-file /tmp/pr_body.md \
            --head "${{ steps.branch.outputs.name }}" \
            --base main)

          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          PR_NUM=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
          echo "num=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "PR 已建立：${PR_URL}"

      # ── 9a. 測試通過 → 自動 merge ─────────────────────────────────
      - name: Auto-merge
        if: >
          steps.diff.outputs.changed == 'true' &&
          steps.tests.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.pr.outputs.num }} \
            --squash \
            --delete-branch \
            --subject "fix: auto-maintain $(date -u +%Y-%m-%d) [auto-merged]"
          echo "PR 已自動 merge"

      # ── 9b. 測試失敗 → 留言 + 加標籤 ─────────────────────────────
      - name: Comment on failed PR
        if: >
          steps.diff.outputs.changed == 'true' &&
          steps.tests.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.num }} \
            --body "⚠️ 自動語法測試失敗，請人工審查此 PR 後再 merge。"
          gh pr edit ${{ steps.pr.outputs.num }} \
            --add-label "needs-review" 2>/dev/null || true

      # ── 10. 摘要 ──────────────────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          echo "=================================="
          echo "Auto-Maintain 結果"
          echo "=================================="
          echo "維護腳本結果 : ${{ steps.maintain.outputs.exit_code }}"
          echo "有程式變更   : ${{ steps.diff.outputs.changed }}"
          echo "語法測試     : ${{ steps.tests.outputs.passed }}"
          echo "PR URL       : ${{ steps.pr.outputs.url }}"
          echo "=================================="
