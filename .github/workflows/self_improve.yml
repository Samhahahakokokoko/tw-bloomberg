name: Self Improve

on:
  schedule:
    # 每天 02:00 台灣時間（UTC 18:00）— 在 auto_maintain 之前執行
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      skip_line:
        description: '略過 LINE 推播（測試用）'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  self-improve:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv loguru aiosqlite asyncpg \
            line-bot-sdk fastapi anthropic sqlalchemy 2>/dev/null || true
          [ -f requirements.txt ] && pip install -r requirements.txt --quiet || true

      # ── 3. 健康檢查 ────────────────────────────────────────────────
      - name: Health check
        id: health
        env:
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          set +e
          python scripts/health_check.py > /tmp/health_output.txt 2>&1
          RESULT=$?
          set -e
          cat /tmp/health_output.txt
          echo "exit_code=${RESULT}" >> "$GITHUB_OUTPUT"
          # 健康檢查失敗不中斷 CI，紀錄後繼續自動修復
          if [ "$RESULT" -ne 0 ]; then
            echo "::warning::Health check found issues — proceeding with auto_fix"
          fi

      # ── 4. 自動修復 ────────────────────────────────────────────────
      - name: Auto fix
        id: autofix
        env:
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_LINE_UID:      ${{ secrets.ADMIN_LINE_UID }}
        run: |
          set +e
          python scripts/auto_fix.py
          RESULT=$?
          set -e
          echo "exit_code=${RESULT}" >> "$GITHUB_OUTPUT"
          if [ "$RESULT" -eq 1 ]; then
            echo "::error::auto_fix.py 執行失敗"
            exit 1
          fi
          # 0 = 無修復；2 = 已套用修復

      # ── 5. 語法檢查（有修復時才跑）────────────────────────────────
      - name: Syntax check
        id: syntax
        if: steps.autofix.outputs.exit_code == '2'
        run: |
          PASS=true
          for dir in backend quant line_webhook scripts; do
            [ -d "$dir" ] && find "$dir" -name "*.py" -exec python -m py_compile {} + || PASS=false
          done
          echo "passed=${PASS}" >> "$GITHUB_OUTPUT"
          [ "$PASS" = "true" ] && echo "✅ 語法全部通過" || echo "::error::語法檢查失敗"

      # ── 6. 偵測程式碼變更 ──────────────────────────────────────────
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "無程式碼變更"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      # ── 7. Commit + push ───────────────────────────────────────────
      - name: Commit and push fixes
        if: >
          steps.diff.outputs.changed == 'true' &&
          steps.syntax.outputs.passed != 'false'
        run: |
          git config user.name  "self-improve[bot]"
          git config user.email "self-improve[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add backend/ quant/ line_webhook/ scripts/ .github/ requirements.txt
          git commit -m "fix: self-improve ${DATE} [auto-fix]" || echo "nothing to commit"
          git push origin main
          echo "✅ 修復已 push"

      # ── 8. 效能分析（每週日執行完整分析，其他日輕量版）──────────
      - name: Performance analyzer
        id: perf
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ github.event.inputs.skip_line == 'true' && '' || secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_LINE_UID:      ${{ secrets.ADMIN_LINE_UID }}
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "7" ]; then
            python scripts/performance_analyzer.py --weekly
          else
            python scripts/performance_analyzer.py --daily
          fi
          echo "✅ 效能分析完成"

      # ── 9. 摘要 ────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 🔧 Self Improve 結果

          | 項目 | 狀態 |
          |------|------|
          | 健康檢查 | ${{ steps.health.outputs.exit_code == '0' && '✅ 全部正常' || '⚠️ 發現問題' }} |
          | 自動修復 | ${{ steps.autofix.outputs.exit_code == '2' && '✅ 已套用修復' || steps.autofix.outputs.exit_code == '0' && '✅ 無需修復' || '❌ 執行失敗' }} |
          | 語法檢查 | ${{ steps.syntax.outputs.passed == 'true' && '✅ 通過' || steps.autofix.outputs.exit_code != '2' && '⏭ 略過' || '❌ 失敗' }} |
          | 程式碼變更 | ${{ steps.diff.outputs.changed == 'true' && '✅ 已 push' || '無變更' }} |

          > 每天 02:00 台灣時間自動執行。
          SUMMARY
